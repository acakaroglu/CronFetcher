# =============================================================================
# CronFetcher Configuration
# =============================================================================
# Copy this file and adjust values for your environment.
# The main script (cronfetcher.sh) sources this file automatically.

# --- SSH Settings ---
SSH_KEY="/var/lib/foreman-proxy/ssh/id_rsa_foreman_proxy"
SSH_USER="satellite-automation"
SSH_CONNECT_TIMEOUT=15

# --- Email Settings ---
MAIL_TO="admin@example.com"
MAIL_FROM="cronfetcher@example.com"
SMTP_HOST="10.0.0.1"
SMTP_PORT=25

# --- Host Discovery ---
# Method: "hammer" (Satellite/Foreman API) or "file" (static host list)
HOST_SOURCE="hammer"

# If HOST_SOURCE="file", provide path to a file with one "hostname|ip" per line
# HOST_FILE="/etc/cronfetcher/hosts.txt"

# If HOST_SOURCE="hammer", optionally cache the host list for faster runs
# Set to 0 to disable caching, or number of seconds to cache (e.g. 86400 = 24h)
HAMMER_CACHE_TTL=86400
HAMMER_CACHE_FILE="/tmp/cronfetcher_hosts.cache"

# --- Log Settings ---
# Log file path on remote hosts (written by injected cron jobs)
REMOTE_LOGFILE="/var/log/cronfetcher.log"

# --- Performance ---
# SSH connect timeout in seconds (hosts that don't respond)
# Lower = faster scan, but may miss slow hosts
# CONNECT_TIMEOUT=15
